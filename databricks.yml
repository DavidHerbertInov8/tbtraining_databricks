bundle:
  name: tesco-bank-training-environment

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-0e43ddc6-9583.cloud.databricks.com

resources:

  jobs:
    training_pipeline:
      name: training_pipeline

      job_clusters:
        - job_cluster_key: training_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.xlarge
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            aws_attributes:
              availability: SPOT
              first_on_demand: 1

      tasks:
        - task_key: bronze_ingest
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: /Repos/david.herbert@inov8consulting.co.uk/external_training_tesco_bank_cloud_enablement/src/notebooks/bronze_ingest.py

        - task_key: silver_clean
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: /Repos/david.herbert@inov8consulting.co.uk/external_training_tesco_bank_cloud_enablement/src/notebooks/silver_clean.py
          depends_on:
            - task_key: bronze_ingest

        - task_key: gold_aggregate
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: /Repos/david.herbert@inov8consulting.co.uk/external_training_tesco_bank_cloud_enablement/src/notebooks/gold_aggregate.py
          depends_on:
            - task_key: silver_clean

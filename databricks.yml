bundle:
  name: tesco-bank-training-environment

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-0e43ddc6-9583.cloud.databricks.com

resources:

  schemas:
    training_schema_bronze:
      name: "${workspace.current_user.short_name}_bronze"
      catalog_name: tesco_bank_training
    training_schema_silver:
      name: "${workspace.current_user.short_name}_silver"
      catalog_name: tesco_bank_training
    training_schema_gold:
      name: "${workspace.current_user.short_name}_gold"
      catalog_name: tesco_bank_training
    training_schema_sandbox:
      name: "${workspace.current_user.short_name}_sandbox"
      catalog_name: tesco_bank_training

  jobs:
    training_pipeline:
      name: "${workspace.current_user.short_name}_training_pipeline"

      git_source:
        git_url: https://github.com/DavidHerbertInov8/tbtraining_databricks.git
        git_provider: gitHub
        git_branch: main

      job_clusters:
        - job_cluster_key: training_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.xlarge
            num_workers: 1
            aws_attributes:
              availability: SPOT
              first_on_demand: 1
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32

      tasks:
        - task_key: bronze_script
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: ./src/bronze.py
            source: GIT

        - task_key: silver_script
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: ./src/silver.py
            source: GIT
          depends_on:
            - task_key: bronze_script

        - task_key: gold_script
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: ./src/gold.py
            source: GIT
          depends_on:
            - task_key: silver_script
